name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Test
        run: make test
      - name: Build universal app
        run: make ci-build
      - name: Verify bundle
        run: EXPECTED_SDK_MAJOR=26 scripts/verify-app.sh build/Nommac.app
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: Nommac-${{ github.sha }}
          path: build/Nommac.app
