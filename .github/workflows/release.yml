name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Read version from tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          certificate="$RUNNER_TEMP/developer-id.p12"
          keychain="$RUNNER_TEMP/nommac-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"

          printf '%s' "$MACOS_CERT_P12_BASE64" | openssl base64 -d -A -out "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          security default-keychain -s "$keychain"
          security find-identity -v -p codesigning "$keychain"

      - name: Test
        run: make test

      - name: Sign, notarize, and package
        run: scripts/release.sh "$RELEASE_VERSION"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/Nommac-"$GITHUB_REF_NAME"-macos-universal.zip \
            dist/Nommac-"$GITHUB_REF_NAME"-macos-universal.dmg \
            dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
